name: portal-staging-deploy

on:
  workflow_run:
    workflows:
      - portal-build
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: portal-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    environment: staging
    env:
      AWS_REGION: ${{ vars.STAGING_AWS_REGION != '' && vars.STAGING_AWS_REGION || 'ap-northeast-1' }}
      BUILD_ARTIFACT_NAME: portal-web-dist
      BUILD_EVIDENCE_ARTIFACT_NAME: portal-build-evidence
      STAGING_SITE_BUCKET_NAME: ${{ vars.STAGING_SITE_BUCKET_NAME }}
      STAGING_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.STAGING_CLOUDFRONT_DISTRIBUTION_ID }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      STAGING_SMOKE_PATHS: ${{ vars.STAGING_SMOKE_PATHS != '' && vars.STAGING_SMOKE_PATHS || '/,/overview,/guidance' }}
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/portal-web/package-lock.json

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/portal-web
        run: npm ci

      - name: Build portal
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/portal-web
        run: npm run build

      - name: Download build artifact from portal-build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: portal-dist

      - name: Download build evidence artifact from portal-build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ env.BUILD_EVIDENCE_ARTIFACT_NAME }}
          path: build-evidence

      - name: Prepare dist from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          rm -rf portal-dist
          cp -R apps/portal-web/dist portal-dist

      - name: Prepare source build evidence from portal-build
        if: github.event_name == 'workflow_run'
        run: cp build-evidence/portal-build-evidence.md staging-source-build-evidence.md

      - name: Prepare source build evidence from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          cat > staging-source-build-evidence.md <<EOF
          ## Portal build evidence

          - Workflow: portal-staging-deploy manual dispatch local build
          - Run ID: ${{ github.run_id }}
          - Run attempt: ${{ github.run_attempt }}
          - Event: ${{ github.event_name }}
          - Ref: ${{ github.ref_name }}
          - Commit SHA: ${{ github.sha }}
          - Dist artifact: ${BUILD_ARTIFACT_NAME}
          - Evidence artifact: in-run local build evidence only
          - Artifact retention days: n/a
          - Validation commands: npm run build
          - Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Resolve SNS staging runtime config
        env:
          STAGING_VARIABLES_JSON: ${{ toJson(vars) }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const vars = JSON.parse(process.env.STAGING_VARIABLES_JSON || '{}');
          const buildKey = (...parts) => parts.join('_');
          const resolved = {
            SNS_SERVICE_MODE: vars[buildKey('STAGING', 'SNS', 'SERVICE', 'MODE')] || 'simulated-route',
            SNS_SERVICE_BASE_URL: vars[buildKey('STAGING', 'SNS', 'SERVICE', 'BASE', 'URL')] || '',
            SNS_TIMELINE_ENDPOINT: vars[buildKey('STAGING', 'SNS', 'TIMELINE', 'ENDPOINT')] || '/api/sns/timeline',
            SNS_POSTS_ENDPOINT: vars[buildKey('STAGING', 'SNS', 'POSTS', 'ENDPOINT')] || '/api/sns/posts',
            SNS_WRITE_SURFACE_ENABLED: vars[buildKey('STAGING', 'SNS', 'WRITE', 'SURFACE', 'ENABLED')] || 'true',
            SNS_PERSISTENCE_MODE: vars[buildKey('STAGING', 'SNS', 'PERSISTENCE', 'MODE')] || 'browser-local-storage'
          };

          const envLines = Object.entries(resolved).map(([key, value]) => `${key}=${String(value)}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `${envLines.join('\n')}\n`, 'utf8');
          EOF

      - name: Validate staging settings
        env:
          AWS_ROLE_TO_ASSUME_STAGING: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
        run: |
          case "$SNS_SERVICE_MODE" in
            simulated-route|http) ;;
            *)
              echo "Unsupported SNS_SERVICE_MODE: $SNS_SERVICE_MODE" >&2
              exit 1
              ;;
          esac
          case "$SNS_PERSISTENCE_MODE" in
            browser-local-storage|memory) ;;
            *)
              echo "Unsupported SNS_PERSISTENCE_MODE: $SNS_PERSISTENCE_MODE" >&2
              exit 1
              ;;
          esac
          test -f portal-dist/index.html
          test -f staging-source-build-evidence.md
          test -n "$STAGING_SITE_BUCKET_NAME"
          test -n "$AWS_ROLE_TO_ASSUME_STAGING"
          if [[ "$SNS_SERVICE_MODE" == 'http' ]]; then
            test -n "$SNS_SERVICE_BASE_URL"
          fi

      - name: Show deploy inputs
        run: |
          release_owner='${{ github.repository_owner }}'
          deploy_operator='${{ github.triggering_actor != '' && github.triggering_actor || github.actor }}'
          notification_route='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          echo "aws_region=$AWS_REGION"
          echo "bucket=$STAGING_SITE_BUCKET_NAME"
          echo "distribution_id=${STAGING_CLOUDFRONT_DISTRIBUTION_ID:-<none>}"
          echo "base_url=${STAGING_BASE_URL:-<none>}"
          echo "smoke_paths=$STAGING_SMOKE_PATHS"
          echo "sns_service_mode=$SNS_SERVICE_MODE"
          echo "sns_service_base_url=${SNS_SERVICE_BASE_URL:-<none>}"
          echo "sns_timeline_endpoint=$SNS_TIMELINE_ENDPOINT"
          echo "sns_posts_endpoint=$SNS_POSTS_ENDPOINT"
          echo "sns_write_surface_enabled=$SNS_WRITE_SURFACE_ENABLED"
          echo "sns_persistence_mode=$SNS_PERSISTENCE_MODE"
          echo "release_owner=$release_owner"
          echo "deploy_operator=$deploy_operator"
          echo "notification_route=$notification_route"

      - name: Write staging runtime config
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const runtimeConfig = {
            VITE_PUBLIC_SNS_SERVICE_MODE: process.env.SNS_SERVICE_MODE,
            VITE_PUBLIC_SNS_SERVICE_BASE_URL: process.env.SNS_SERVICE_BASE_URL,
            VITE_PUBLIC_SNS_TIMELINE_ENDPOINT: process.env.SNS_TIMELINE_ENDPOINT,
            VITE_PUBLIC_SNS_POSTS_ENDPOINT: process.env.SNS_POSTS_ENDPOINT,
            VITE_PUBLIC_SNS_WRITE_SURFACE_ENABLED: process.env.SNS_WRITE_SURFACE_ENABLED,
            VITE_PUBLIC_SNS_PERSISTENCE_MODE: process.env.SNS_PERSISTENCE_MODE
          };

          const filePath = path.join(process.cwd(), 'portal-dist', 'runtime-config.js');
          const fileBody = `globalThis.__PORTAL_RUNTIME_CONFIG__ = Object.assign({}, globalThis.__PORTAL_RUNTIME_CONFIG__ ?? {}, ${JSON.stringify(runtimeConfig, null, 2)});\n`;
          fs.writeFileSync(filePath, fileBody, 'utf8');
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync portal artifact to staging bucket
        run: |
          aws s3 sync portal-dist/ "s3://${STAGING_SITE_BUCKET_NAME}" --delete

      - name: Invalidate CloudFront cache
        if: env.STAGING_CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$STAGING_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*'

      - name: Wait for edge propagation window
        if: env.STAGING_BASE_URL != ''
        run: sleep 15

      - name: Initialize staging monitoring record
        if: always()
        run: |
          release_owner='${{ github.repository_owner }}'
          deploy_operator='${{ github.triggering_actor != '' && github.triggering_actor || github.actor }}'
          notification_route='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          source_build_run_id='manual-dispatch'
          source_build_sha='${{ github.sha }}'
          source_build_run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          source_build_workflow='portal-staging-deploy manual dispatch local build'
          if [[ '${{ github.event_name }}' == 'workflow_run' ]]; then
            source_build_run_id='${{ github.event.workflow_run.id }}'
            source_build_sha='${{ github.event.workflow_run.head_sha }}'
            source_build_run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}'
            source_build_workflow='portal-build'
          fi
          cat > staging-monitoring-record.md <<EOF
          ## Staging monitoring record

          - Workflow: portal-staging-deploy
          - Run ID: ${{ github.run_id }}
          - Run attempt: ${{ github.run_attempt }}
          - Event: ${{ github.event_name }}
          - Bucket: ${STAGING_SITE_BUCKET_NAME:-not configured}
          - CloudFront distribution: ${STAGING_CLOUDFRONT_DISTRIBUTION_ID:-not configured}
          - Base URL: ${STAGING_BASE_URL:-not configured}
          - Smoke paths: ${STAGING_SMOKE_PATHS}
          - SNS service mode: ${SNS_SERVICE_MODE}
          - SNS service base URL: ${SNS_SERVICE_BASE_URL:-not configured}
          - SNS timeline endpoint: ${SNS_TIMELINE_ENDPOINT}
          - SNS posts endpoint: ${SNS_POSTS_ENDPOINT}
          - SNS write surface enabled: ${SNS_WRITE_SURFACE_ENABLED}
          - SNS persistence mode: ${SNS_PERSISTENCE_MODE}
          - Release owner: ${release_owner}
          - Deploy operator: ${deploy_operator}
          - Notification route: ${notification_route}
          - Source build workflow: ${source_build_workflow}
          - Source build run ID: ${source_build_run_id}
          - Source build commit SHA: ${source_build_sha}
          - Source build run URL: ${source_build_run_url}
          - Source build evidence artifact: ${BUILD_EVIDENCE_ARTIFACT_NAME}

          ### Source build evidence snapshot

          EOF
          cat staging-source-build-evidence.md >> staging-monitoring-record.md
          cat <<EOF >> staging-monitoring-record.md

          ### SNS runtime config snapshot

          - Service mode: ${SNS_SERVICE_MODE}
          - Service base URL: ${SNS_SERVICE_BASE_URL:-not configured}
          - Timeline endpoint: ${SNS_TIMELINE_ENDPOINT}
          - Posts endpoint: ${SNS_POSTS_ENDPOINT}
          - Write surface enabled: ${SNS_WRITE_SURFACE_ENABLED}
          - Persistence mode: ${SNS_PERSISTENCE_MODE}

          ### Reachability results

          | Path | HTTP status | Result | Expected marker |
          | --- | --- | --- | --- |
          EOF

      - name: Run post-deploy smoke checks
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${STAGING_BASE_URL:-}" ]]; then
            echo "| skipped | n/a | skipped | STAGING_BASE_URL not configured |" >> staging-monitoring-record.md
            exit 0
          fi

          IFS=',' read -r -a paths <<< "$STAGING_SMOKE_PATHS"
          failure=0
          for raw_path in "${paths[@]}"; do
            path="${raw_path//[[:space:]]/}"
            [[ -z "$path" ]] && continue
            url="${STAGING_BASE_URL%/}${path}"
            expected='SPA shell markers: MultiCloudProject Portal + <div id="app"></div>'
            echo "Checking $url"
            response_file="$(mktemp)"
            status_code='curl-failed'
            result='failed'
            if status_code="$(curl --show-error --silent --location --output "$response_file" --write-out '%{http_code}' "$url")"; then
              if [[ "$status_code" =~ ^2[0-9][0-9]$ ]] && grep -q 'MultiCloudProject Portal' "$response_file" && grep -q '<div id="app"></div>' "$response_file"; then
                result='passed'
              else
                failure=1
              fi
            else
              failure=1
            fi
            echo "| $path | $status_code | $result | $expected |" >> staging-monitoring-record.md
            rm -f "$response_file"
          done

          echo "" >> staging-monitoring-record.md
          echo "Owner note: release owner defaults to repository owner and deploy operator defaults to the triggering actor for this run." >> staging-monitoring-record.md

          exit "$failure"

      - name: Upload staging monitoring record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-staging-monitoring-record
          path: staging-monitoring-record.md

      - name: Record deployment summary
        if: always()
        run: |
          release_owner='${{ github.repository_owner }}'
          deploy_operator='${{ github.triggering_actor != '' && github.triggering_actor || github.actor }}'
          notification_route='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          {
            echo "## Staging deploy summary"
            echo "- Bucket: $STAGING_SITE_BUCKET_NAME"
            echo "- CloudFront distribution: ${STAGING_CLOUDFRONT_DISTRIBUTION_ID:-not configured}"
            echo "- Base URL: ${STAGING_BASE_URL:-not configured}"
            echo "- Smoke paths: $STAGING_SMOKE_PATHS"
            echo "- Release owner: $release_owner"
            echo "- Deploy operator: $deploy_operator"
            echo "- Notification route: $notification_route"
            echo "- Monitoring record artifact: portal-staging-monitoring-record"
            echo ""
            cat staging-monitoring-record.md
          } >> "$GITHUB_STEP_SUMMARY"
