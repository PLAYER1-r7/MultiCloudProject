name: Issue Label Guard

"on":
  issues:
    types:
      - opened
      - reopened
      - unlabeled

permissions:
  issues: write

jobs:
  remind-if-unlabeled:
    runs-on: ubuntu-latest
    steps:
      - name: Comment when issue has no labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found.');
              return;
            }

            if ((issue.labels || []).length > 0) {
              core.info('Issue already has labels.');
              return;
            }

            const marker = '<!-- issue-label-guard -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              typeof comment.body === 'string' && comment.body.includes(marker)
            );

            if (existing) {
              core.info('Reminder comment already exists.');
              return;
            }

            const body = [
              marker,
              'This issue currently has no labels.',
              '',
              'Repository rule:',
              '- add labels as part of issue creation, not later cleanup',
              '- verify labels immediately after `gh issue create`',
              '',
              'Helpful commands:',
              `- \`gh issue view ${issue.number} --json number,title,labels\``,
              `- \`gh issue edit ${issue.number} --add-label "planning" --add-label "portal"\``,
              '',
              'Label selection guidance lives in `docs_agent/27_GITHUB_OPERATIONS_COMMANDS.md` and `docs/portal/02_GITHUB_ISSUE_WORKFLOW.md`.',
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body,
            });
