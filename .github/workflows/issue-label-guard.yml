name: Issue Label Guard

"on":
  issues:
    types:
      - opened
      - reopened
      - unlabeled

permissions:
  issues: write

jobs:
  remind-if-unlabeled:
    runs-on: ubuntu-latest
    concurrency:
      group: issue-label-guard-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Comment when issue has no labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found.');
              return;
            }

            const { data: liveIssue } = await github.rest.issues.get({
              ...context.repo,
              issue_number: issue.number,
            });

            const labels = Array.isArray(liveIssue.labels) ? liveIssue.labels : [];
            if (labels.length > 0) {
              core.info('Issue already has labels.');
              return;
            }

            const repoName = `${context.repo.owner}/${context.repo.repo}`;

            const marker = '<!-- issue-label-guard -->';
            const perPage = 100;
            let page = 1;
            let existing = null;

            while (!existing) {
              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: issue.number,
                per_page: perPage,
                page,
              });

              if (!comments || comments.length === 0) {
                break;
              }

              existing = comments.find(
                (comment) =>
                  typeof comment.body === 'string' && comment.body.includes(marker),
              );

              if (comments.length < perPage) {
                break;
              }

              page += 1;
            }

            if (existing) {
              core.info('Reminder comment already exists.');
              return;
            }

            const body = [
              marker,
              'This issue currently has no labels.',
              '',
              'Repository rule:',
              '- add labels as part of issue creation, not later cleanup',
              '- verify labels immediately after `gh issue create`',
              '',
              'Helpful commands:',
              `- \`scripts/create-github-issue.sh --repo ${repoName} --title "..." --body-file path/to/issue.md --label planning --label portal\``,
              `- \`gh issue view ${issue.number} --repo ${repoName} --json number,title,labels\``,
              `- \`gh issue edit ${issue.number} --repo ${repoName} --add-label "planning" --add-label "portal"\``,
              '',
              'Label selection guidance lives in `docs_agent/27_GITHUB_OPERATIONS_COMMANDS.md` and `docs/portal/02_GITHUB_ISSUE_WORKFLOW.md`.',
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body,
            });
